<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>SoraSys · Articlespace</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Crimson+Text:wght@400;600&family=Fira+Code:wght@300;400&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0b1114;
      color: #bcccd6;
      font-family: 'Crimson Text', serif;
      padding: 24px;
      min-height: 100vh;
      cursor: none;
    }
    #cursor {
      position: fixed;
      width: 8px;
      height: 8px;
      background: #ff3b7c;
      border-radius: 50%;
      pointer-events: none;
      z-index: 10000;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 16px rgba(255, 59, 124, 0.25);
      display: none;
      transition: transform 0.08s ease, background 0.2s ease;
    }
    #cursor.active {
      display: block;
    }
    #cursor.hover {
      transform: translate(-50%, -50%) scale(2.8);
      background: rgba(255, 59, 124, 0.25);
      box-shadow: 0 0 32px rgba(255, 59, 124, 0.4);
    }
    @media (max-width: 640px) { 
      #cursor { display: none !important; }
      body { cursor: auto; }
    }
    .space-header {
      max-width: 900px;
      margin: 0 auto 28px;
      border-bottom: 1px solid rgba(107, 142, 155, 0.12);
      padding-bottom: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .space-title {
      font-family: 'Cinzel', serif;
      font-weight: 600;
      font-size: 22px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #6b8e9b;
    }
    .space-title span { color: #ff3b7c; }
    .space-nav a {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #4a6673;
      text-decoration: none;
      margin-left: 16px;
      transition: color 0.3s ease;
    }
    .space-nav a:hover { color: #ff3b7c; }
    .articles-container {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .article-card {
      background: rgba(20, 30, 35, 0.7);
      border: 1px solid rgba(107, 142, 155, 0.08);
      border-left: 2px solid rgba(107, 142, 155, 0.08);
      border-radius: 3px;
      transition: border-color 0.3s ease, background 0.3s ease;
      cursor: pointer;
      overflow: hidden;
    }
    .article-card:hover {
      border-color: rgba(255, 59, 124, 0.15);
      border-left-color: rgba(255, 59, 124, 0.35);
    }
    .article-card.expanded {
      border-left-color: #ff3b7c;
      background: rgba(20, 30, 35, 0.9);
    }
    .article-card .card-inner {
      padding: 16px 20px;
    }
    .article-card .title {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      letter-spacing: 1.5px;
      color: #6b8e9b;
      line-height: 1.3;
      transition: color 0.3s ease;
    }
    .article-card.expanded .title {
      color: #86aab8;
    }
    .article-card .title.pulse-active {
      animation: pulse-opacity 1.5s ease-in-out infinite;
    }
    @keyframes pulse-opacity {
      0%, 100% { opacity: 0.65; }
      50% { opacity: 1; }
    }
    .article-card .meta {
      font-family: 'Fira Code', monospace;
      font-size: 8px;
      letter-spacing: 1.5px;
      color: #4a6673;
      margin-top: 4px;
      margin-bottom: 10px;
    }
    .article-card .content {
      font-family: 'Crimson Text', serif;
      font-size: 15px;
      line-height: 1.65;
      color: #bcccd6;
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow: hidden;
    }
    .article-card .content.full {
      max-height: none;
      transition: max-height 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
    }
    .article-card .char-remain {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      color: #ff3b7c;
      opacity: 0.7;
      letter-spacing: 1px;
      margin-top: 6px;
      display: block;
      animation: pulse-opacity 2s ease-in-out infinite;
    }
    .article-card .toggle-hint {
      font-family: 'Fira Code', monospace;
      font-size: 7px;
      letter-spacing: 2px;
      color: #4a6673;
      margin-top: 10px;
      opacity: 0.4;
      transition: opacity 0.3s ease;
    }
    .article-card:hover .toggle-hint {
      opacity: 0.8;
    }
    .empty-articles {
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 18px;
      color: #4a6673;
      padding: 60px 0;
    }
    @media (max-width: 640px) {
      .space-header { flex-direction: column; gap: 12px; text-align: center; }
      .space-nav a { margin: 0 8px; }
      .article-card .card-inner { padding: 14px 16px; }
      .article-card .title { font-size: 15px; }
      body { padding: 16px; cursor: auto; }
    }
  </style>
</head>
<body>
<div id="cursor"></div>
<div class="space-header">
  <div class="space-title">⟨ <span>Article</span>space ⟩</div>
  <div class="space-nav">
    <a href="/">↩ Home</a>
    <a href="/control-panel">⌘ Panel</a>
  </div>
</div>
<div id="articles-container" class="articles-container">
  <div class="empty-articles">loading articles...</div>
</div>

<script>
  (function() {
    // Only enable custom cursor on desktop
    if (window.innerWidth > 640) {
      const cursor = document.getElementById('cursor');
      if (cursor) {
        cursor.classList.add('active');
        document.body.style.cursor = 'none';

        let mx = -100, my = -100;
        let cx = -100, cy = -100;

        function updateCursor() {
          cx += (mx - cx) * 0.2;
          cy += (my - cy) * 0.2;
          cursor.style.left = cx + 'px';
          cursor.style.top = cy + 'px';
          requestAnimationFrame(updateCursor);
        }

        document.addEventListener('mousemove', (e) => {
          mx = e.clientX;
          my = e.clientY;
        });

        document.addEventListener('mouseleave', () => {
          cursor.classList.remove('active');
        });

        document.addEventListener('mouseenter', () => {
          cursor.classList.add('active');
        });

        const interactiveElements = document.querySelectorAll('a, .article-card, .space-nav a, .space-header');
        interactiveElements.forEach(el => {
          el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
          el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
        });

        updateCursor();
      }
    } else {
      document.body.style.cursor = 'auto';
    }

    // Track active (expanded) card
    let activeCard = null;

    // Base path the app is mounted at (everything before an article slug, if any)
    let basePath = window.location.pathname.replace(/\/+$/, '') || '';

    function buildArticleUrl(slug) {
      const b = basePath === '' ? '' : basePath;
      return (b === '' ? '' : b) + '/' + slug;
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function slugify(title) {
      return (title || 'Untitled')
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '');
    }

    async function loadArticles() {
      try {
        const res = await fetch('/api/articles');
        if (!res.ok) throw new Error('Failed to fetch');
        const articles = await res.json();
        const container = document.getElementById('articles-container');

        if (!articles || articles.length === 0) {
          container.innerHTML = '<div class="empty-articles">no articles have been published yet.</div>';
          return;
        }

        // Compute unique share slugs up front
        const slugs = articles.map((a, index) => {
          let slug = slugify(a.title);
          const duplicateCount = articles.filter((art, idx) => {
            return idx < index && slugify(art.title) === slug;
          }).length;
          if (duplicateCount > 0) slug += '-' + (duplicateCount + 1);
          return slug;
        });

        // If the current URL's last path segment matches a slug, treat everything
        // before it as the app's base path (so links keep working after navigation).
        const pathSegments = window.location.pathname.replace(/\/+$/, '').split('/');
        const lastSegment = pathSegments[pathSegments.length - 1];
        let initialSlug = null;
        if (slugs.includes(lastSegment)) {
          initialSlug = lastSegment;
          basePath = pathSegments.slice(0, -1).join('/');
        }

        container.innerHTML = articles.map((a, index) => {
          const content = a.content || '';
          const title = a.title || 'Untitled';
          const author = a.author || 'Anonymous';
          const date = new Date(a.created_at).toLocaleDateString();
          const slug = slugs[index];

          const previewText = content.length > 200 ? content.slice(0, 200) : content;
          const fullText = content;
          const charRemain = content.length > 200 ? content.length - 200 : 0;

          const previewInner = escapeHtml(previewText) +
            (charRemain > 0 ? '<span class="char-remain">' + charRemain + ' characters remain</span>' : '');

          return '<div class="article-card" data-article-index="' + index + '" data-share="' + slug + '">' +
            '<div class="card-inner">' +
              '<div class="title">' + escapeHtml(title) + '</div>' +
              '<div class="meta">' + date + ' · ' + escapeHtml(author) + '</div>' +
              '<div class="content preview" data-full="' + escapeHtml(fullText) + '" data-preview="' + escapeHtml(previewText) + '" data-remain="' + charRemain + '">' + previewInner + '</div>' +
              '<div class="toggle-hint">▸ click to expand · share: ' + slug + '</div>' +
            '</div>' +
          '</div>';
        }).join('');

        document.querySelectorAll('.article-card').forEach(card => {
          card.addEventListener('click', function(e) {
            e.stopPropagation();
            toggleCard(this);
          });
        });

        // If the page loaded on a direct article link, expand + scroll to it
        if (initialSlug) {
          const match = Array.from(document.querySelectorAll('.article-card'))
            .find(c => c.dataset.share === initialSlug);
          if (match) {
            toggleCard(match, { skipPush: true, scroll: true });
          }
        }

      } catch (err) {
        console.error('Error loading articles:', err);
        document.getElementById('articles-container').innerHTML = '<div class="empty-articles">failed to load articles.</div>';
      }
    }

    function collapseCard(card) {
      const contentDiv = card.querySelector('.content');
      const titleDiv = card.querySelector('.title');
      const toggleHint = card.querySelector('.toggle-hint');
      const previewText = contentDiv.dataset.preview;
      const remain = parseInt(contentDiv.dataset.remain, 10);

      contentDiv.classList.remove('full');
      contentDiv.classList.add('preview');

      let previewHtml = escapeHtml(previewText);
      if (remain > 0) previewHtml += '<span class="char-remain">' + remain + ' characters remain</span>';
      contentDiv.innerHTML = previewHtml;

      titleDiv.classList.remove('pulse-active');
      card.classList.remove('expanded');
      toggleHint.textContent = '▸ click to expand · share: ' + card.dataset.share;

      if (activeCard === card) activeCard = null;
    }

    function expandCard(card) {
      const contentDiv = card.querySelector('.content');
      const titleDiv = card.querySelector('.title');
      const toggleHint = card.querySelector('.toggle-hint');
      const fullText = contentDiv.dataset.full;

      contentDiv.classList.remove('preview');
      contentDiv.classList.add('full');
      contentDiv.textContent = fullText;

      titleDiv.classList.add('pulse-active');
      card.classList.add('expanded');
      toggleHint.textContent = '▾ expanded · share: ' + card.dataset.share;

      if (activeCard && activeCard !== card) collapseCard(activeCard);
      activeCard = card;
    }

    // Toggle card between minimized and maximized state
    function toggleCard(card, opts) {
      opts = opts || {};
      const contentDiv = card.querySelector('.content');
      const isMinimized = contentDiv.classList.contains('preview');

      if (isMinimized) {
        expandCard(card);
        if (!opts.skipPush && history.pushState) {
          history.pushState({ article: card.dataset.share }, '', buildArticleUrl(card.dataset.share));
        }
        if (opts.scroll) {
          requestAnimationFrame(() => {
            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
          });
        }
      } else {
        collapseCard(card);
        if (!opts.skipPush && history.pushState) {
          history.pushState({}, '', basePath === '' ? '/' : basePath);
        }
      }
    }

    loadArticles();

    // Handle back/forward navigation
    window.addEventListener('popstate', function() {
      const pathSegments = window.location.pathname.replace(/\/+$/, '').split('/');
      const lastSegment = pathSegments[pathSegments.length - 1];
      const cards = document.querySelectorAll('.article-card');
      const match = Array.from(cards).find(c => c.dataset.share === lastSegment);

      if (activeCard && activeCard !== match) collapseCard(activeCard);
      if (match) {
        expandCard(match);
        match.scrollIntoView({ behavior: 'smooth', block: 'center' });
      } else if (activeCard) {
        collapseCard(activeCard);
      }
    });

  })();
</script>
</body>
</html>
